name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'k8s/**'
      - '.github/workflows/ci-cd.yml'

concurrency:
  group: gitops
  cancel-in-progress: true

jobs:
  build-and-push:
    # Prevent infinite loop caused by workflow commits
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      ####################################################
      # Build & Push Frontend
      ####################################################

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/inventory-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/inventory-frontend:${{ github.sha }}

      ####################################################
      # Build & Push Backend
      ####################################################

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/inventory-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/inventory-backend:${{ github.sha }}

      ####################################################
      # Update Kubernetes Manifests
      ####################################################

      - name: Update Frontend Image Tag
        run: |
          sed -i -E \
          "s|image: .*/inventory-frontend:[a-zA-Z0-9._-]+|image: ${{ secrets.DOCKERHUB_USERNAME }}/inventory-frontend:${{ github.sha }}|g" \
          k8s/deployment-frontend.yaml

      - name: Update Backend Image Tag
        run: |
          sed -i -E \
          "s|image: .*/inventory-backend:[a-zA-Z0-9._-]+|image: ${{ secrets.DOCKERHUB_USERNAME }}/inventory-backend:${{ github.sha }}|g" \
          k8s/deployment-backend.yaml

      ####################################################
      # Commit Updated Manifests
      ####################################################

      - name: Commit Updated Manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add k8s/

          if git diff --cached --quiet; then
            echo "No manifest changes."
          else
            git commit -m "chore: update image tags to ${{ github.sha }} [skip ci]"
            git push
          fi
